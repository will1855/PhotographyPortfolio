<!-- SVG Filters for Liquid Glass Refraction -->
<svg style="position: absolute; width: 0; height: 0; pointer-events: none; overflow: hidden;" aria-hidden="true">
  <defs>
    <!--
      Liquid Lens Backdrop Filter
      Simulates real glass refraction:
      1. Turbulence noise (reactive — baseFrequency mutated by JS on hover)
      2. Gaussian blur to organically soften noise edges before displacement
      3. Displacement map warps the actual background image through the glass
      4. Brightness/contrast lift to simulate light bending through a curved lens
    -->
    <filter id="liquid-lens-backdrop" x="-25%" y="-25%" width="150%" height="150%" color-interpolation-filters="sRGB">
      <!-- Step 1: Generate organic noise — JS updates baseFrequency live -->
      <feTurbulence
        type="fractalNoise"
        baseFrequency="0.015 0.015"
        numOctaves="4"
        seed="2"
        stitchTiles="stitch"
        result="noise" />
      <!-- Step 2: Blur the noise for softer, more organic warp edges -->
      <feGaussianBlur in="noise" stdDeviation="1.2" result="softNoise" />
      <!-- Step 3: Displace the source graphic (background) through the soft noise -->
      <feDisplacementMap
        in="SourceGraphic"
        in2="softNoise"
        scale="18"
        xChannelSelector="R"
        yChannelSelector="G"
        result="displaced" />
      <!-- Step 4: Subtle brightness lift to simulate curved glass catching light -->
      <feComponentTransfer in="displaced">
        <feFuncR type="linear" slope="1.03" intercept="0.01" />
        <feFuncG type="linear" slope="1.03" intercept="0.01" />
        <feFuncB type="linear" slope="1.03" intercept="0.01" />
      </feComponentTransfer>
    </filter>
  </defs>
</svg>
