<!-- SVG Filters for Liquid Glass Refraction -->
<svg style="position: absolute; width: 0; height: 0; pointer-events: none; overflow: hidden;" aria-hidden="true">
  <defs>
    <filter id="liquid-lens-backdrop" x="-25%" y="-25%" width="150%" height="150%" color-interpolation-filters="sRGB">
      <feTurbulence
        type="fractalNoise"
        baseFrequency="0.015 0.015"
        numOctaves="4"
        seed="2"
        stitchTiles="stitch"
        result="noise" />
      <feGaussianBlur in="noise" stdDeviation="1.2" result="softNoise" />
      <feDisplacementMap
        in="SourceGraphic"
        in2="softNoise"
        scale="18"
        xChannelSelector="R"
        yChannelSelector="G"
        result="displaced" />
      <feComponentTransfer in="displaced">
        <feFuncR type="linear" slope="1.03" intercept="0.01" />
        <feFuncG type="linear" slope="1.03" intercept="0.01" />
        <feFuncB type="linear" slope="1.03" intercept="0.01" />
      </feComponentTransfer>
    </filter>
  </defs>
</svg>
